name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libdbus-1-dev libssl-dev

            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - uses: Swatinem/rust-cache@v2

            - name: Format check
              run: cargo fmt --all -- --check

            - name: Clippy
              run: cargo clippy --all-targets -- -D warnings

            - name: Test
              run: cargo test

            - name: Build release
              run: cargo build --release

            - name: Smoke test
              run: |
                  ./target/release/prayer-times --version
                  ./target/release/prayer-times --help
                  ./target/release/prayer-times methods | grep -q 'Muslim World League'
                  ./target/release/prayer-times madhab | grep -q 'Shafi'
                  ./target/release/prayer-times generate-shell
                  test -f target/completions/prayer-times.bash
                  test -f target/completions/_prayer-times
                  test -f target/completions/prayer-times.fish

    nix-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: DeterminateSystems/nix-installer-action@main
            - uses: DeterminateSystems/magic-nix-cache-action@main
              with:
                  use-flakehub: false

            - run: nix build

            - name: Smoke test
              run: |
                  ./result/bin/prayer-times --version
                  ./result/bin/prayer-times --help
                  ./result/bin/prayer-times methods | grep -q 'Muslim World League'
                  ./result/bin/prayer-times madhab | grep -q 'Shafi'

                  test -f ./result/share/bash-completion/completions/prayer-times
                  test -f ./result/share/zsh/site-functions/_prayer-times
                  test -f ./result/share/fish/vendor_completions.d/prayer-times.fish
                  test -f ./result/share/icons/hicolor/128x128/apps/prayer-times.png
